---
- name: Install Google Chrome (AUR)
  ansible.builtin.shell: paru -S --noconfirm google-chrome
  become: false
  args:
    creates: /usr/bin/google-chrome-stable
  when: pkg_manager == "pacman"

- name: Add Chrome apt repo key (Ubuntu/Debian)
  ansible.builtin.shell: |
    curl -fsSL https://dl.google.com/linux/linux_signing_key.pub \
      | gpg --dearmor --output /usr/share/keyrings/google-chrome.gpg
  args:
    creates: /usr/share/keyrings/google-chrome.gpg
  when: pkg_manager == "apt"

- name: Add Chrome apt repo (Ubuntu/Debian)
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main"
    filename: google-chrome
    state: present
  when: pkg_manager == "apt"

- name: Install Google Chrome (apt)
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true
  when: pkg_manager == "apt"

- name: Add Chrome dnf repo (Fedora)
  ansible.builtin.yum_repository:
    name: google-chrome
    description: Google Chrome
    baseurl: https://dl.google.com/linux/chrome/rpm/stable/x86_64
    enabled: true
    gpgcheck: true
    gpgkey: https://dl.google.com/linux/linux_signing_key.pub
    state: present
  when: pkg_manager == "dnf"

- name: Install Google Chrome (dnf)
  ansible.builtin.dnf:
    name: google-chrome-stable
    state: present
  when: pkg_manager == "dnf"
