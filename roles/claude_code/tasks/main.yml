---
- name: Check if Claude Code is installed
  ansible.builtin.stat:
    path: "{{ real_user_home }}/.local/bin/claude"
  register: claude_bin
  become: false

- name: Install Claude Code
  ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | sh
  changed_when: true
  become: false
  when: not claude_bin.stat.exists
