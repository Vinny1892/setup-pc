---
- name: Check if codex is installed
  ansible.builtin.stat:
    path: "{{ real_user_home }}/.local/bin/codex"
  register: codex_bin
  become: false

- name: Install codex via npm (user prefix)
  ansible.builtin.shell: npm install -g --prefix ~/.local @openai/codex
  changed_when: true
  become: false
  when: not codex_bin.stat.exists
