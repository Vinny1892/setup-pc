---
- name: Install podman and buildah via pacman
  community.general.pacman:
    name:
      - podman
      - buildah
    state: present
  when: pkg_manager == "pacman"

- name: Install podman and buildah via apt
  ansible.builtin.apt:
    name:
      - podman
      - buildah
    state: present
    update_cache: true
  when: pkg_manager == "apt"

- name: Install podman and buildah via dnf
  ansible.builtin.dnf:
    name:
      - podman
      - buildah
    state: present
  when: pkg_manager == "dnf"

# nvidia-container-toolkit required for distrobox --nvidia passthrough
- name: Install nvidia-container-toolkit via AUR
  kewlfft.aur.aur:
    name: nvidia-container-toolkit
    use: paru
    state: present
  become: false
  environment:
    SUDO_ASKPASS: /tmp/ansible-askpass.sh
  when: pkg_manager == "pacman"

- name: Install nvidia-container-toolkit via apt
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true
  when: pkg_manager == "apt"

- name: Install nvidia-container-toolkit via dnf
  ansible.builtin.dnf:
    name: nvidia-container-toolkit
    state: present
  when: pkg_manager == "dnf"

# Directory structure on host — models dir is shared into the container automatically
- name: Create ComfyUI directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  become: false
  loop:
    - "{{ comfyui_app_dir }}"
    - "{{ comfyui_models_dir }}/checkpoints"
    - "{{ comfyui_models_dir }}/loras"
    - "{{ comfyui_models_dir }}/vae"
    - "{{ comfyui_models_dir }}/embeddings"
    - "{{ comfyui_models_dir }}/controlnet"
    - "{{ comfyui_models_dir }}/upscale_models"
    - "{{ comfyui_models_dir }}/clip"
    - "{{ comfyui_models_dir }}/diffusion_models"

# Clone ComfyUI on the host — distrobox shares $HOME so it's visible inside
- name: Clone ComfyUI repository
  ansible.builtin.git:
    repo: https://github.com/comfyanonymous/ComfyUI.git
    dest: "{{ comfyui_app_dir }}"
    update: true
  become: false

# Build custom image with PyTorch baked in — skipped if image already exists
- name: Check if comfyui image exists
  ansible.builtin.command: buildah images --quiet localhost/{{ comfyui_container_name }}:latest
  register: comfyui_image_check
  changed_when: false
  failed_when: false
  become: false

- name: Deploy Containerfile for comfyui image
  ansible.builtin.copy:
    dest: "{{ comfyui_dir }}/Containerfile"
    mode: '0644'
    content: |
      FROM archlinux:latest
      RUN pacman -Sy --noconfirm --needed \
            python python-pip \
            python-pytorch-opt-cuda \
            python-torchvision-cuda \
            curl && \
          pacman -Scc --noconfirm
  become: false
  when: comfyui_image_check.stdout == ""

- name: Build comfyui image with buildah
  ansible.builtin.command: buildah bud -t localhost/{{ comfyui_container_name }}:latest {{ comfyui_dir }}
  become: false
  when: comfyui_image_check.stdout == ""

# Container lifecycle
- name: Check if comfyui container exists
  ansible.builtin.command: distrobox-list --no-color
  register: comfyui_distrobox_list
  changed_when: false
  failed_when: false
  become: false

- name: Create comfyui distrobox container
  ansible.builtin.command: >
    distrobox-create
    --name {{ comfyui_container_name }}
    --image localhost/{{ comfyui_container_name }}:latest
    --nvidia
    --yes
  become: false
  when: comfyui_container_name not in (comfyui_distrobox_list.stdout | default(''))

# First enter initializes the container (installs distrobox hooks inside)
- name: Initialize comfyui container
  ansible.builtin.shell: distrobox-enter --name {{ comfyui_container_name }} -- true
  become: false
  changed_when: false
  when: comfyui_container_name not in (comfyui_distrobox_list.stdout | default(''))

# Install ComfyUI Python deps inside container using system PyTorch
- name: Install ComfyUI requirements inside container
  ansible.builtin.shell: |
    distrobox-enter --name {{ comfyui_container_name }} -- bash -c "
      python -m venv --system-site-packages {{ comfyui_app_dir }}/venv &&
      {{ comfyui_app_dir }}/venv/bin/pip install --quiet --upgrade pip &&
      {{ comfyui_app_dir }}/venv/bin/pip install --quiet \
        -r {{ comfyui_app_dir }}/requirements.txt
    "
  become: false
  args:
    creates: "{{ comfyui_app_dir }}/venv/lib"

# Point ComfyUI to the host models directory
- name: Deploy extra_model_paths.yaml
  ansible.builtin.copy:
    dest: "{{ comfyui_app_dir }}/extra_model_paths.yaml"
    mode: '0644'
    content: |
      comfyui:
        base_path: {{ comfyui_models_dir }}
        checkpoints: checkpoints/
        loras: loras/
        vae: vae/
        embeddings: embeddings/
        controlnet: controlnet/
        upscale_models: upscale_models/
        clip: clip/
        diffusion_models: diffusion_models/
  become: false

# Launcher: starts ComfyUI inside distrobox, waits for server, opens Chromium fullscreen
- name: Deploy ComfyUI launcher script
  ansible.builtin.copy:
    dest: "{{ real_user_home }}/.local/bin/comfyui"
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -e

      PORT={{ comfyui_port }}
      CONTAINER={{ comfyui_container_name }}
      APP_DIR={{ comfyui_app_dir }}

      cleanup() {
        echo "[comfyui] Stopping server..."
        podman exec "$CONTAINER" pkill -f "python main.py" 2>/dev/null || true
        kill "$SERVER_PID" 2>/dev/null || true
      }
      trap cleanup EXIT

      echo "[comfyui] Starting server in distrobox..."
      distrobox-enter --name "$CONTAINER" -- bash -c "
        source $APP_DIR/venv/bin/activate &&
        cd $APP_DIR &&
        python main.py --listen 127.0.0.1 --port $PORT
      " &
      SERVER_PID=$!

      echo "[comfyui] Waiting for server on port $PORT..."
      until curl -sf "http://127.0.0.1:$PORT" > /dev/null 2>&1; do
        sleep 1
      done

      echo "[comfyui] Opening Chromium..."
      chromium --app="http://127.0.0.1:$PORT" \
        --user-data-dir=/tmp/comfyui-chromium
  become: false

- name: Deploy ComfyUI desktop entry
  ansible.builtin.copy:
    dest: "{{ real_user_home }}/.local/share/applications/comfyui.desktop"
    mode: '0644'
    content: |
      [Desktop Entry]
      Name=ComfyUI
      Exec=bash -c '{{ real_user_home }}/.local/bin/comfyui'
      Icon=image-x-generic
      Type=Application
      Categories=Graphics;
      Terminal=false
  become: false

- name: Add comfyui alias to fish config
  ansible.builtin.blockinfile:
    path: "{{ real_user_home }}/.config/fish/config.fish"
    marker: "# {mark} ANSIBLE MANAGED - comfyui alias"
    block: |
      alias comfyui='~/.local/bin/comfyui'
  become: false
