---
- name: Install common packages (pacman)
  community.general.pacman:
    name: "{{ common_packages }}"
    state: present
  when: pkg_manager == "pacman"

- name: Install common packages (apt)
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
  when: pkg_manager == "apt"

- name: Install common packages (dnf)
  ansible.builtin.dnf:
    name: "{{ common_packages }}"
    state: present
  when: pkg_manager == "dnf"

- name: Set fish as default shell
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    shell: /usr/bin/fish

- name: Disable fish greeting (override CachyOS default)
  ansible.builtin.blockinfile:
    path: "{{ real_user_home }}/.config/fish/config.fish"
    marker: "# {mark} ANSIBLE MANAGED - disable fish greeting"
    block: |
      function fish_greeting
      end
  become: false

- name: Add kubectl k alias to fish config
  ansible.builtin.blockinfile:
    path: "{{ real_user_home }}/.config/fish/config.fish"
    marker: "# {mark} ANSIBLE MANAGED - kubectl alias"
    block: |
      alias k=kubectl
  become: false
