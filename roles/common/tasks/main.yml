---
- name: Install common packages (pacman)
  community.general.pacman:
    name: "{{ common_packages }}"
    state: present
  when: pkg_manager == "pacman"

- name: Install common packages (apt)
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
  when: pkg_manager == "apt"

- name: Install common packages (dnf)
  ansible.builtin.dnf:
    name: "{{ common_packages }}"
    state: present
  when: pkg_manager == "dnf"

- name: Set fish as default shell
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    shell: /usr/bin/fish
