---
- name: Install docker, lazygit and lazydocker via pacman
  community.general.pacman:
    name:
      - docker
      - docker-compose
      - lazygit
      - lazydocker
    state: present
  when: pkg_manager == "pacman"

- name: Install docker and lazygit via apt
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
      - lazygit
    state: present
  when: pkg_manager == "apt"

- name: Install docker and lazygit via dnf
  ansible.builtin.dnf:
    name:
      - docker
      - docker-compose
      - lazygit
    state: present
  when: pkg_manager == "dnf"

- name: Install lazydocker via go on apt/dnf systems
  ansible.builtin.shell: go install github.com/jesseduffield/lazydocker@latest
  become: false
  args:
    creates: "{{ real_user_home }}/go/bin/lazydocker"
  when: pkg_manager in ["apt", "dnf"]

- name: Install kind via binary
  ansible.builtin.shell: |
    curl -Lo /usr/local/bin/kind \
      https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64 && \
    chmod +x /usr/local/bin/kind
  args:
    creates: /usr/local/bin/kind

- name: Install minikube via binary
  ansible.builtin.shell: |
    curl -Lo /usr/local/bin/minikube \
      https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64 && \
    chmod +x /usr/local/bin/minikube
  args:
    creates: /usr/local/bin/minikube

- name: Enable and start docker
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: docker
    append: true
