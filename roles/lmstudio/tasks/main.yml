---
- name: Install lmstudio-bin (AUR)
  kewlfft.aur.aur:
    name: lmstudio-bin
    use: paru
    state: present
  become: false
  environment:
    SUDO_ASKPASS: /tmp/ansible-askpass.sh
  when: pkg_manager == "pacman"

- name: Check if lmstudio is installed (Ubuntu/Fedora)
  ansible.builtin.stat:
    path: "{{ real_user_home }}/.lmstudio/bin/lms"
  register: lmstudio_bin
  become: false
  when: pkg_manager != "pacman"

- name: Install lmstudio via install.sh (Ubuntu/Fedora)
  ansible.builtin.shell: |
    curl -fsSL https://lmstudio.ai/install.sh | bash
  become: false
  when:
    - pkg_manager != "pacman"
    - not lmstudio_bin.stat.exists
