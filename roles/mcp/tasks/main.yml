---
- name: Add kubernetes-mcp-server
  ansible.builtin.command:
    cmd: >
      claude mcp add kubernetes-mcp-server
      -e KUBECONFIG={{ real_user_home }}/.kube/config
      --
      npx -y kubernetes-mcp-server@latest --read-only
  become: false
  register: mcp_k8s
  changed_when: "'already exists' not in mcp_k8s.stderr"
  failed_when: mcp_k8s.rc != 0 and 'already exists' not in mcp_k8s.stderr

- name: Add grafana MCP server
  ansible.builtin.command:
    cmd: >
      claude mcp add grafana
      -e GRAFANA_URL={{ grafana_url | default('http://localhost:3000') }}
      -e GRAFANA_SERVICE_ACCOUNT_TOKEN={{ grafana_token | default('') }}
      --
      uvx mcp-grafana
  become: false
  register: mcp_grafana
  changed_when: "'already exists' not in mcp_grafana.stderr"
  failed_when: mcp_grafana.rc != 0 and 'already exists' not in mcp_grafana.stderr

- name: Add cloudflare MCP server
  ansible.builtin.command:
    cmd: claude mcp add --transport http cloudflare https://mcp.cloudflare.com/mcp
  become: false
  register: mcp_cloudflare
  changed_when: "'already exists' not in mcp_cloudflare.stderr"
  failed_when: mcp_cloudflare.rc != 0 and 'already exists' not in mcp_cloudflare.stderr
