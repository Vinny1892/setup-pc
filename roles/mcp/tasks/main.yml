---
- name: Configurar MCP servers no ~/.claude/settings.json
  ansible.builtin.shell: |
    jq '. * {
      "mcpServers": {
        "kubernetes-mcp-server": {
          "command": "npx",
          "args": ["-y", "kubernetes-mcp-server@latest", "--read-only"],
          "env": {
            "KUBECONFIG": "{{ real_user_home }}/.kube/config"
          }
        },
        "grafana": {
          "command": "uvx",
          "args": ["mcp-grafana"],
          "env": {
            "GRAFANA_URL": "{{ grafana_url | default('http://localhost:3000') }}",
            "GRAFANA_SERVICE_ACCOUNT_TOKEN": "{{ grafana_token | default('') }}"
          }
        },
        "cloudflare": {
          "type": "http",
          "url": "https://mcp.cloudflare.com/mcp"
        }
      }
    }' ~/.claude/settings.json > /tmp/claude_settings_new.json \
    && mv /tmp/claude_settings_new.json ~/.claude/settings.json
  become: false
  changed_when: true
