---
- name: Clone noctalia plugins repository
  ansible.builtin.git:
    repo: https://github.com/noctalia-dev/noctalia-plugins.git
    dest: /tmp/noctalia-plugins
    depth: 1
    update: true
  become: false

- name: Install network-manager-vpn noctalia plugin
  ansible.builtin.shell: |
    cp -r /tmp/noctalia-plugins/network-manager-vpn \
      {{ real_user_home }}/.config/noctalia/plugins/
  args:
    creates: "{{ real_user_home }}/.config/noctalia/plugins/network-manager-vpn"
  become: false

- name: Deploy noctalia settings.json
  ansible.builtin.copy:
    src: noctalia-settings.json
    dest: "{{ real_user_home }}/.config/noctalia/settings.json"
    mode: '0644'
  become: false

- name: Deploy noctalia plugins.json
  ansible.builtin.copy:
    src: noctalia-plugins.json
    dest: "{{ real_user_home }}/.config/noctalia/plugins.json"
    mode: '0644'
  become: false

- name: Create noctalia Everdeer colorscheme dir
  ansible.builtin.file:
    path: "{{ real_user_home }}/.config/noctalia/colorschemes/Everdeer"
    state: directory
    mode: '0755'
  become: false

- name: Deploy noctalia Everdeer colorscheme
  ansible.builtin.copy:
    src: noctalia-everdeer.json
    dest: "{{ real_user_home }}/.config/noctalia/colorschemes/Everdeer/Everdeer.json"
    mode: '0644'
  become: false

- name: Deploy custom keybinds.kdl
  ansible.builtin.copy:
    src: keybinds.kdl
    dest: "{{ real_user_home }}/.config/niri/cfg/keybinds.kdl"
    mode: '0644'
  become: false
  tags: keybinds

- name: Deploy layout.kdl
  ansible.builtin.copy:
    src: layout.kdl
    dest: "{{ real_user_home }}/.config/niri/cfg/layout.kdl"
    mode: '0644'
  become: false
  tags: niri

- name: Deploy rules.kdl
  ansible.builtin.copy:
    src: rules.kdl
    dest: "{{ real_user_home }}/.config/niri/cfg/rules.kdl"
    mode: '0644'
  become: false
  tags: niri

- name: Create wireplumber config dir
  ansible.builtin.file:
    path: "{{ real_user_home }}/.config/wireplumber/wireplumber.conf.d"
    state: directory
    mode: '0755'
  become: false
  tags: audio

- name: Deploy NVidia HDMI profile rule for WirePlumber
  ansible.builtin.copy:
    src: 51-nvidia-hdmi-profile.conf
    dest: "{{ real_user_home }}/.config/wireplumber/wireplumber.conf.d/51-nvidia-hdmi-profile.conf"
    mode: '0644'
  become: false
  tags: audio

- name: Create environment.d config dir
  ansible.builtin.file:
    path: "{{ real_user_home }}/.config/environment.d"
    state: directory
    mode: '0755'
  become: false

- name: Set Qt theme environment
  ansible.builtin.copy:
    dest: "{{ real_user_home }}/.config/environment.d/qt-theme.conf"
    mode: '0644'
    content: |
      QT_QPA_PLATFORMTHEME=gtk3
      QT_STYLE_OVERRIDE=Fusion
  become: false

- name: Create user GTK3 config dir
  ansible.builtin.file:
    path: "{{ real_user_home }}/.config/gtk-3.0"
    state: directory
    mode: '0755'
  become: false

- name: Deploy user GTK3 CSS with Everdeer accent color
  ansible.builtin.copy:
    dest: "{{ real_user_home }}/.config/gtk-3.0/gtk.css"
    mode: '0644'
    content: |
      @define-color theme_selected_bg_color #ffb4a3;
      @define-color theme_selected_fg_color #621000;
  become: false

- name: Create root GTK3 config dir
  ansible.builtin.file:
    path: /root/.config/gtk-3.0
    state: directory
    mode: '0755'
  become: true

- name: Set dark mode for root GTK3 (btrfs-assistant via pkexec reads this)
  ansible.builtin.copy:
    dest: /root/.config/gtk-3.0/settings.ini
    mode: '0644'
    content: |
      [Settings]
      gtk-application-prefer-dark-theme=1
  become: true

- name: Deploy root GTK3 CSS with Everdeer accent color
  ansible.builtin.copy:
    dest: /root/.config/gtk-3.0/gtk.css
    mode: '0644'
    content: |
      @define-color theme_selected_bg_color #ffb4a3;
      @define-color theme_selected_fg_color #621000;
  become: true

- name: Check if everdeer-folders icon theme needs rebuild
  ansible.builtin.stat:
    path: /usr/share/icons/everdeer-folders/48x48/places/inode-directory.svg
  register: _everdeer_built
  become: false

- name: Build everdeer-folders icon theme from Papirus-Dark
  ansible.builtin.shell: |
    set -e
    THEME_DIR="/usr/share/icons/everdeer-folders"
    rm -rf "$THEME_DIR"
    mkdir -p "$THEME_DIR"

    cat > "$THEME_DIR/index.theme" << 'EOF'
    [Icon Theme]
    Name=Everdeer Folders
    Comment=Papirus-Dark with Everdeer palette folder colors
    Inherits=Papirus-Dark

    Directories=16x16/places,22x22/places,24x24/places,32x32/places,48x48/places,64x64/places

    [16x16/places]
    Size=16
    Type=Fixed
    Context=Places

    [22x22/places]
    Size=22
    Type=Fixed
    Context=Places

    [24x24/places]
    Size=24
    Type=Fixed
    Context=Places

    [32x32/places]
    Size=32
    Type=Fixed
    Context=Places

    [48x48/places]
    Size=48
    Type=Fixed
    Context=Places

    [64x64/places]
    Size=64
    Type=Fixed
    Context=Places
    EOF

    for SIZE in 16x16 22x22 24x24 32x32 48x48 64x64; do
      DEST="$THEME_DIR/$SIZE/places"
      mkdir -p "$DEST"
      for SRC_DIR in "/usr/share/icons/Papirus-Dark/$SIZE/places" "/usr/share/icons/Papirus/$SIZE/places"; do
        [ -d "$SRC_DIR" ] || continue
        find "$SRC_DIR" \( -name "folder-pink*.svg" -o -name "user-pink*.svg" \) -not -type l | while read -r f; do
          sed -e 's/ec407a/1c110e/g' -e 's/f06292/ffb4a3/g' \
              -e 's/4285f4/1c110e/g' -e 's/5c6bc0/ffb4a3/g' \
              "$f" > "$DEST/$(basename "$f")"
        done
        find "$SRC_DIR" -maxdepth 1 -type l | while read -r link; do
          target=$(readlink "$link")
          [[ "$target" == *pink* ]] || continue
          cp -f "$(readlink -f "$link")" "$DEST/$(basename "$link")" 2>/dev/null || true
        done
      done
      # Garante folder.svg e inode-directory.svg como arquivos reais
      [ -f "$DEST/folder-pink.svg" ] && cp "$DEST/folder-pink.svg" "$DEST/folder.svg"
      [ -f "$DEST/folder.svg" ] && cp "$DEST/folder.svg" "$DEST/inode-directory.svg"
    done

    gtk-update-icon-cache "$THEME_DIR"
  become: true
  when: not _everdeer_built.stat.exists
  changed_when: true

- name: Set everdeer-folders as icon theme (gsettings)
  ansible.builtin.command:
    cmd: gsettings set org.gnome.desktop.interface icon-theme 'everdeer-folders'
  become: false
  changed_when: false

- name: Set GTK accent color to match niri theme
  ansible.builtin.command:
    cmd: gsettings set org.gnome.desktop.interface accent-color 'pink'
  become: false
  changed_when: false

- name: Set everdeer-folders as icon theme for KDE apps (kdeglobals)
  ansible.builtin.copy:
    dest: "{{ real_user_home }}/.config/kdeglobals"
    mode: '0644'
    content: |
      [Icons]
      Theme=everdeer-folders
  become: false

- name: Disable focus-follows-mouse in niri input config
  ansible.builtin.lineinfile:
    path: "{{ real_user_home }}/.config/niri/cfg/input.kdl"
    regexp: '^\s*focus-follows-mouse'
    line: '    // focus-follows-mouse // Automatically focus windows under the mouse pointer'
  become: false
  tags: keybinds
