---
- name: Clone noctalia plugins repository
  ansible.builtin.git:
    repo: https://github.com/noctalia-dev/noctalia-plugins.git
    dest: /tmp/noctalia-plugins
    depth: 1
    update: true
  become: false

- name: Install network-manager-vpn noctalia plugin
  ansible.builtin.shell: |
    cp -r /tmp/noctalia-plugins/network-manager-vpn \
      {{ real_user_home }}/.config/noctalia/plugins/
  args:
    creates: "{{ real_user_home }}/.config/noctalia/plugins/network-manager-vpn"
  become: false

- name: Deploy noctalia settings.json
  ansible.builtin.copy:
    src: noctalia-settings.json
    dest: "{{ real_user_home }}/.config/noctalia/settings.json"
    mode: '0644'
  become: false

- name: Deploy custom keybinds.kdl
  ansible.builtin.copy:
    src: keybinds.kdl
    dest: "{{ real_user_home }}/.config/niri/cfg/keybinds.kdl"
    mode: '0644'
  become: false
  tags: keybinds

- name: Deploy layout.kdl
  ansible.builtin.copy:
    src: layout.kdl
    dest: "{{ real_user_home }}/.config/niri/cfg/layout.kdl"
    mode: '0644'
  become: false
  tags: niri

- name: Deploy rules.kdl
  ansible.builtin.copy:
    src: rules.kdl
    dest: "{{ real_user_home }}/.config/niri/cfg/rules.kdl"
    mode: '0644'
  become: false
  tags: niri

- name: Create wireplumber config dir
  ansible.builtin.file:
    path: "{{ real_user_home }}/.config/wireplumber/wireplumber.conf.d"
    state: directory
    mode: '0755'
  become: false
  tags: audio

- name: Deploy NVidia HDMI profile rule for WirePlumber
  ansible.builtin.copy:
    src: 51-nvidia-hdmi-profile.conf
    dest: "{{ real_user_home }}/.config/wireplumber/wireplumber.conf.d/51-nvidia-hdmi-profile.conf"
    mode: '0644'
  become: false
  tags: audio

- name: Create environment.d config dir
  ansible.builtin.file:
    path: "{{ real_user_home }}/.config/environment.d"
    state: directory
    mode: '0755'
  become: false

- name: Set Qt platform theme to follow GTK
  ansible.builtin.copy:
    dest: "{{ real_user_home }}/.config/environment.d/qt-theme.conf"
    mode: '0644'
    content: |
      QT_QPA_PLATFORMTHEME=gnome
  become: false

- name: Set Papirus-Dark as icon theme (gsettings)
  ansible.builtin.command:
    cmd: gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
  become: false
  changed_when: false

- name: Set GTK accent color to match niri theme
  ansible.builtin.command:
    cmd: gsettings set org.gnome.desktop.interface accent-color 'pink'
  become: false
  changed_when: false

- name: Set Papirus-Dark as icon theme for KDE apps (kdeglobals)
  ansible.builtin.copy:
    dest: "{{ real_user_home }}/.config/kdeglobals"
    mode: '0644'
    content: |
      [Icons]
      Theme=Papirus-Dark
  become: false

- name: Check if Papirus folder icons still have original pink color
  ansible.builtin.command:
    cmd: grep -rl "ec407a" /usr/share/icons/Papirus/48x48/places/folder-pink.svg
  register: _papirus_color_check
  changed_when: false
  failed_when: false
  become: false

- name: Recolor Papirus folder icons to match niri Everdeer palette
  ansible.builtin.shell: |
    find /usr/share/icons/Papirus /usr/share/icons/Papirus-Dark \
      \( -name "folder-pink*.svg" -o -name "user-pink*.svg" \) -not -type l \
      -exec sed -i -e 's/ec407a/1c110e/g' -e 's/f06292/ffb4a3/g' {} \;
    gtk-update-icon-cache /usr/share/icons/Papirus
    gtk-update-icon-cache /usr/share/icons/Papirus-Dark
  become: true
  when: _papirus_color_check.rc == 0
  changed_when: true

- name: Disable focus-follows-mouse in niri input config
  ansible.builtin.lineinfile:
    path: "{{ real_user_home }}/.config/niri/cfg/input.kdl"
    regexp: '^\s*focus-follows-mouse'
    line: '    // focus-follows-mouse // Automatically focus windows under the mouse pointer'
  become: false
  tags: keybinds
