---
# Modern CLI tools
- name: Install shell tools via pacman
  community.general.pacman:
    name:
      - eza
      - bat
      - fd
      - ripgrep
      - sd
      - git-delta
      - dust
      - procs
      - bottom
      - duf
      - zoxide
      - starship
      - atuin
    state: present
  when: pkg_manager == "pacman"

- name: Install shell tools via apt
  ansible.builtin.apt:
    name:
      - bat
      - fd-find
      - ripgrep
      - duf
      - zoxide
      - atuin
    state: present
  when: pkg_manager == "apt"

- name: Install shell tools via dnf
  ansible.builtin.dnf:
    name:
      - bat
      - fd-find
      - ripgrep
      - duf
      - zoxide
      - atuin
    state: present
  when: pkg_manager == "dnf"

# Aliases and shell initialization
- name: Configure modern tool aliases in fish shell
  ansible.builtin.blockinfile:
    path: "{{ real_user_home }}/.config/fish/config.fish"
    marker: "# {mark} ANSIBLE MANAGED - shell tools aliases"
    block: |
      alias ls='eza --icons'
      alias ll='eza -lah --icons --git'
      alias cat='bat --paging=never'
      alias find='fd'
      alias grep='rg'
      alias du='dust'
      alias df='duf'
      alias top='btm'
      alias lg='lazygit'
      alias ldc='lazydocker'
      zoxide init fish | source
      atuin init fish | source
      starship init fish | source
  become: false

# Git
- name: Configure delta as git pager
  community.general.git_config:
    name: core.pager
    value: delta
    scope: global
  become: false

- name: Configure delta for side-by-side view
  community.general.git_config:
    name: delta.side-by-side
    value: "true"
    scope: global
  become: false

- name: Configure delta as interactive diff tool
  community.general.git_config:
    name: interactive.diffFilter
    value: "delta --color-only"
    scope: global
  become: false

- name: Configure zdiff3 as merge conflict style
  community.general.git_config:
    name: merge.conflictstyle
    value: zdiff3
    scope: global
  become: false
