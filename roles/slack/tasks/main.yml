---
- name: Instalar Slack (Ubuntu - via deb)
  when: pkg_manager == "apt"
  block:
    - name: Adicionar chave GPG do Slack
      ansible.builtin.get_url:
        url: https://packagecloud.io/slacktechnologies/slack/gpgkey
        dest: /etc/apt/keyrings/slack.asc
        mode: '0644'

    - name: Adicionar repositório do Slack
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/slack.asc] https://packagecloud.io/slacktechnologies/slack/debian/ jessie main"
        filename: slack
        state: present

    - name: Instalar slack-desktop
      ansible.builtin.apt:
        name: slack-desktop
        state: present
        update_cache: true

- name: Instalar Slack (Fedora - via RPM)
  when: pkg_manager == "dnf"
  block:
    - name: Adicionar repositório do Slack
      ansible.builtin.yum_repository:
        name: slack
        description: Slack Repository
        baseurl: https://packagecloud.io/slacktechnologies/slack/fedora/21/x86_64
        gpgcheck: false
        enabled: true

    - name: Instalar slack
      ansible.builtin.dnf:
        name: slack
        state: present

- name: Instalar Slack (Arch - via AUR já tratado no cachyos_niri.yml)
  ansible.builtin.debug:
    msg: "Slack no Arch é instalado via AUR (extra_packages)"
  when: pkg_manager == "pacman"
