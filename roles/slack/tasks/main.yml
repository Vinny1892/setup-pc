---
- name: Install Slack on Ubuntu via deb
  when: pkg_manager == "apt"
  block:
    - name: Add Slack GPG key
      ansible.builtin.get_url:
        url: https://packagecloud.io/slacktechnologies/slack/gpgkey
        dest: /etc/apt/keyrings/slack.asc
        mode: '0644'

    - name: Add Slack apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/slack.asc] https://packagecloud.io/slacktechnologies/slack/debian/ jessie main"
        filename: slack
        state: present

    - name: Install slack-desktop
      ansible.builtin.apt:
        name: slack-desktop
        state: present
        update_cache: true

- name: Install Slack on Fedora via RPM
  when: pkg_manager == "dnf"
  block:
    - name: Add Slack dnf repository
      ansible.builtin.yum_repository:
        name: slack
        description: Slack Repository
        baseurl: https://packagecloud.io/slacktechnologies/slack/fedora/21/x86_64
        gpgcheck: false
        enabled: true

    - name: Install slack
      ansible.builtin.dnf:
        name: slack
        state: present

- name: Notify Slack on Arch is handled via AUR
  ansible.builtin.debug:
    msg: "Slack on Arch is installed via AUR (extra_packages)"
  when: pkg_manager == "pacman"
