---
# ZRAM
- name: Install zram-generator via pacman
  community.general.pacman:
    name: zram-generator
    state: present
  when: pkg_manager == "pacman"

- name: Install zram-generator via apt
  ansible.builtin.apt:
    name: systemd-zram-generator
    state: present
  when: pkg_manager == "apt"

- name: Configure zram-generator
  ansible.builtin.template:
    src: zram-generator.conf.j2
    dest: /etc/systemd/zram-generator.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reiniciar zram

- name: Enable and start zram0
  ansible.builtin.systemd_service:
    name: systemd-zram-setup@zram0.service
    enabled: true
    state: started
    daemon_reload: true

# Snapper
- name: Install snapper and snap-pac via pacman
  community.general.pacman:
    name:
      - snapper
      - snap-pac
    state: present
  when: pkg_manager == "pacman"

- name: Install snapper via apt
  ansible.builtin.apt:
    name: snapper
    state: present
  when: pkg_manager == "apt"

- name: Install snapper via dnf
  ansible.builtin.dnf:
    name: snapper
    state: present
  when: pkg_manager == "dnf"

- name: Check if snapper root config exists
  ansible.builtin.stat:
    path: /etc/snapper/configs/root
  register: snapper_root_config

- name: Create snapper root config
  ansible.builtin.command: snapper -c root create-config /
  when: not snapper_root_config.stat.exists
  changed_when: true

- name: Configure snapper snapshot retention policy
  ansible.builtin.lineinfile:
    path: /etc/snapper/configs/root
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  loop:
    - { key: TIMELINE_CREATE,          value: '"yes"' }
    - { key: TIMELINE_CLEANUP,         value: '"yes"' }
    - { key: TIMELINE_LIMIT_HOURLY,    value: '"10"' }
    - { key: TIMELINE_LIMIT_DAILY,     value: '"7"' }
    - { key: TIMELINE_LIMIT_WEEKLY,    value: '"1"' }
    - { key: TIMELINE_LIMIT_MONTHLY,   value: '"1"' }
    - { key: TIMELINE_LIMIT_YEARLY,    value: '"0"' }
    - { key: NUMBER_LIMIT,             value: '"50"' }
    - { key: NUMBER_CLEANUP,           value: '"yes"' }

- name: Enable snapper services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - snapper-timeline.timer
    - snapper-cleanup.timer

# Limine snapper sync (CachyOS/Arch com limine)
- name: Check if limine-snapper-sync is installed
  ansible.builtin.stat:
    path: /etc/limine-snapper-sync.conf
  register: limine_snapper_conf

- name: Set Limine max snapshot entries to auto
  ansible.builtin.lineinfile:
    path: /etc/limine-snapper-sync.conf
    regexp: '^\s*MAX_SNAPSHOT_ENTRIES='
    line: 'MAX_SNAPSHOT_ENTRIES=auto'
  when: limine_snapper_conf.stat.exists

# CoW desabilitado para Docker e Ollama (btrfs)
- name: Create no-CoW directories for Docker and Ollama
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0710'
  loop:
    - /var/lib/docker
    - /var/lib/ollama

- name: Disable Copy-on-Write on /var/lib/docker
  ansible.builtin.command: chattr +C /var/lib/docker
  register: chattr_docker
  changed_when: chattr_docker.rc == 0
  failed_when: false

- name: Disable Copy-on-Write on /var/lib/ollama
  ansible.builtin.command: chattr +C /var/lib/ollama
  register: chattr_ollama
  changed_when: chattr_ollama.rc == 0
  failed_when: false
