---
# WireGuard
- name: Install wireguard-tools via pacman
  community.general.pacman:
    name: wireguard-tools
    state: present
  when: pkg_manager == "pacman"

- name: Install wireguard via apt
  ansible.builtin.apt:
    name: wireguard
    state: present
  when: pkg_manager == "apt"

- name: Install wireguard-tools via dnf
  ansible.builtin.dnf:
    name: wireguard-tools
    state: present
  when: pkg_manager == "dnf"

# Cloudflare WARP - Arch/CachyOS (AUR)
- name: Install cloudflare-warp-bin via paru on Arch/CachyOS
  kewlfft.aur.aur:
    name: cloudflare-warp-bin
    use: paru
    state: present
  become: false
  environment:
    SUDO_ASKPASS: /tmp/ansible-askpass.sh
  when: pkg_manager == "pacman"

# Cloudflare WARP - Ubuntu/Debian
- name: Add Cloudflare WARP GPG key for apt
  ansible.builtin.shell: |
    curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | \
    gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
  changed_when: true
  when: pkg_manager == "apt"

- name: Add Cloudflare WARP apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg]
      https://pkg.cloudflareclient.com/ {{ ansible_distribution_release }} main
    filename: cloudflare-client
    state: present
  when: pkg_manager == "apt"

- name: Install cloudflare-warp via apt
  ansible.builtin.apt:
    name: cloudflare-warp
    state: present
    update_cache: true
  when: pkg_manager == "apt"

# Cloudflare WARP - Fedora
- name: Add Cloudflare WARP dnf repository
  ansible.builtin.get_url:
    url: https://pkg.cloudflareclient.com/cloudflare-warp-ascii.repo
    dest: /etc/yum.repos.d/cloudflare-warp.repo
    mode: '0644'
  when: pkg_manager == "dnf"

- name: Install cloudflare-warp via dnf
  ansible.builtin.dnf:
    name: cloudflare-warp
    state: present
  when: pkg_manager == "dnf"

# Enable WARP service
- name: Enable and start warp-svc
  ansible.builtin.systemd_service:
    name: warp-svc
    enabled: true
    state: started
